<svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00E5FF;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8B5CF6;stop-opacity:1" />
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background circle -->
  <circle cx="100" cy="100" r="90" fill="#030508" stroke="url(#grad1)" stroke-width="2"/>
  
  <!-- "不" character stylized -->
  <g filter="url(#glow)">
    <!-- Main vertical stroke -->
    <rect x="85" y="45" width="12" height="100" rx="6" fill="url(#grad1)"/>
    
    <!-- Top horizontal stroke -->
    <rect x="60" y="45" width="60" height="12" rx="6" fill="url(#grad1)"/>
    
    <!-- Middle horizontal stroke -->
    <rect x="60" y="85" width="45" height="12" rx="6" fill="url(#grad1)"/>
    
    <!-- Bottom horizontal stroke -->
    <rect x="60" y="125" width="60" height="12" rx="6" fill="url(#grad1)"/>
    
    <!-- Curved accent -->
    <path d="M 110 55 Q 135 70, 135 100 Q 135 130, 110 145" 
          fill="none" stroke="url(#grad1)" stroke-width="10" stroke-linecap="round"/>
  </g>
  
  <!-- Small accent dots -->
  <circle cx="55" cy="55" r="6" fill="#00E5FF" opacity="0.8"/>
  <circle cx="145" cy="55" r="4" fill="#8B5CF6" opacity="0.6"/>
  <circle cx="55" cy="145" r="4" fill="#8B5CF6" opacity="0.6"/>
</svg>